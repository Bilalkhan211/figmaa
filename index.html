<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Hira Princess 💖</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="welcome-screen" class="screen active">
        <div class="envelope-container" id="envelope">
            <div class="envelope">
                <div class="front flap"></div>
                <div class="front pocket"></div>
                <div class="letter">
                    <p>Tap to Open, Hira Love 🌸</p>
                </div>
            </div>
            <h1 class="glow-text">For My Hira Princess 👑</h1>
            <p class="subtitle">My Princess • My Cartoon • My Best Friend and My Love</p>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <canvas id="confetti"></canvas>
        <div class="content">
            <h1 class="main-title">Happy Birthday In Advance, Hira Princess! 🎂</h1>
            <h2 class="date">✨ 5 August ✨</h2>
            <p class="nicknames">My Jan 💕 • My Cartoon 🌸 • My Princess 👑</p>
            <div class="message-box">
                <p id="typewriter"></p>
            </div>
            <div class="gallery">
                <div class="polaroid">
                    <div class="img-placeholder" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);">
                        👑</div>
                    <p>My Princess Hira</p>
                </div>
                <div class="polaroid">
                    <div class="img-placeholder" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);">
                        🌸</div>
                    <p>Hira Jan Forever</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
